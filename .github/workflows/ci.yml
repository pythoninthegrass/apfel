name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$latest" ]]; then
            echo "Selecting $latest"
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          echo "Active SDK: $(xcrun --show-sdk-version)"
          echo "Swift: $(swift --version 2>&1 | head -1)"

      - name: Build
        run: swift build -c release

      - name: Unit tests
        run: swift run apfel-tests

      - name: Install Python test dependencies
        run: pip3 install --break-system-packages pytest httpx

      - name: Integration tests (model-free subset)
        run: |
          # GitHub-hosted macos-26 runners are Intel with no Apple Intelligence.
          # We run every test that does NOT need the model. Full 7-suite
          # qualification (157 tests) runs locally via `make preflight`/`make release`.

          # CLI flag/help/version/file tests (no model needed)
          python3 -m pytest Tests/integration/cli_e2e_test.py \
            -k "help or version or invalid_flag or no_color or ansi or exit_code or update or release_exits or release_in_help or release_shows_version or mcp_timeout_flag or mcp_timeout_env or file_flag_missing or file_flag_nonexistent or file_flag_image or file_flag_binary or file_flag_unknown" \
            -v --tb=short

          # Benchmark structure test (no model needed)
          python3 -m pytest Tests/integration/performance_test.py \
            -v --tb=short
